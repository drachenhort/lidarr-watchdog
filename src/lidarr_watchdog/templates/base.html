<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>lidarr-watchdog</title>
  <style>
    body {
      font-family: system-ui, sans-serif;
      margin: 2rem auto;
      max-width: 60rem;
      padding: 0 1rem;
      color: #1a1a1a;
      background: #fafafa;
    }
    h1 { font-size: 1.4rem; display: inline-block; margin-right: 1rem; }
    h2 { font-size: 1.1rem; margin-top: 2rem; }
    nav { display: inline-block; }
    nav a { color: #555; text-decoration: none; margin-right: 1rem; font-size: 0.9rem; }
    nav a:hover { text-decoration: underline; }
    .status, .card {
      padding: 1rem;
      background: #fff;
      border: 1px solid #ddd;
      border-radius: 6px;
    }
    .status.error { border-color: #d33; background: #fff5f5; }
    .status p, .card p { margin: 0.25rem 0; }
    .banner {
      padding: 0.75rem 1rem;
      border-radius: 6px;
      margin-bottom: 1rem;
      font-size: 0.9rem;
    }
    .banner.ok { background: #f0fff4; border: 1px solid #9ae6b4; color: #22543d; }
    .banner.error { background: #fff5f5; border: 1px solid #f5b5b5; color: #822727; }
    table {
      width: 100%;
      border-collapse: collapse;
      background: #fff;
      margin-top: 0.5rem;
    }
    th, td {
      text-align: left;
      padding: 0.5rem 0.75rem;
      border-bottom: 1px solid #eee;
      font-size: 0.9rem;
    }
    th { background: #f0f0f0; }
    .empty { color: #777; }
    form.settings-form { margin-top: 1rem; }
    form.settings-form label {
      display: block;
      font-size: 0.85rem;
      font-weight: 600;
      margin: 1rem 0 0.25rem;
    }
    form.settings-form input, form.settings-form select {
      width: 100%;
      max-width: 30rem;
      padding: 0.4rem 0.5rem;
      font-size: 0.95rem;
      border: 1px solid #ccc;
      border-radius: 4px;
      box-sizing: border-box;
      background: #fff;
    }
    form.settings-form .hint { color: #777; font-size: 0.8rem; margin-top: 0.25rem; }
    form.settings-form .actions { margin-top: 1.5rem; }
    button {
      font-size: 0.9rem;
      padding: 0.5rem 1rem;
      border-radius: 4px;
      border: 1px solid #ccc;
      background: #fff;
      cursor: pointer;
      margin-right: 0.5rem;
    }
    button.primary { background: #2b6cb0; border-color: #2b6cb0; color: #fff; }
  </style>
</head>
<body>
  <h1>lidarr-watchdog</h1>
  <nav>
    <a href="/">Dashboard</a>
    <a href="/settings">Settings</a>
  </nav>

  {% block content %}{% endblock %}
</body>
</html>
